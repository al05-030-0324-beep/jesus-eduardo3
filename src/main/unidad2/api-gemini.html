<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini - Examen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            background: #212121;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
            border: 1px solid #3e3e3e;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .back-button a {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2b2b2b;
            color: #e0e0e0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #4a4a4a;
            transition: all 0.2s;
        }
        .back-button a:hover {
            background: #3e3e3e;
            color: white;
        }

        .chat-header {
            padding: 20px 24px 20px 100px;
            background: #1a1a1a;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .chat-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header h1 img {
            width: 36px;
            height: 36px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #212121;
        }

        .message {
            display: flex;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            margin-right: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user .message-avatar {
            order: 2;
            margin-right: 0;
            margin-left: 12px;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .user .message-content {
            background: #2b2b2b;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
            border: 1px solid #3e3e3e;
        }
        .assistant .message-content {
            background: #1a1a1a;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid #3e3e3e;
        }

        .message-content p {
            margin: 0 0 8px 0;
        }
        .message-content p:last-child {
            margin-bottom: 0;
        }

        .typing {
            padding: 12px 16px;
            background: #1a1a1a;
            border-radius: 18px;
            display: inline-flex;
            gap: 4px;
            border: 1px solid #3e3e3e;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #a0a0a0;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        .input-area {
            padding: 20px 24px;
            background: #1a1a1a;
            border-top: 1px solid #3e3e3e;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #2b2b2b;
            border-radius: 30px;
            padding: 8px 16px;
            border: 1px solid #4a4a4a;
        }
        .input-container input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
            color: #ffffff;
        }
        .input-container input::placeholder {
            color: #6b6b6b;
        }
        .input-container button {
            background: #4285F4;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .input-container button:hover {
            background: #3367d6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="back-button">
            <a href="examen-unidad-2.html">
                ← Volver al inicio
            </a>
        </div>

        <div class="chat-header">
            <h1>
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" alt="Gemini">
                Gemini
            </h1>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message assistant">
                <div class="message-avatar">
                    <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/dark/gemini-color.png" alt="Gemini">
                </div>
                <div class="message-content">
                    <p>¡Hola! Soy Gemini. Puedo responder tus preguntas en texto. ¿En qué te ayudo?</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <input type="text" id="pregunta" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
                <button onclick="enviarPregunta()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const messagesArea = document.getElementById('messagesArea');
        const preguntaInput = document.getElementById('pregunta');
        
        // === CONFIGURACIÓN ===
        const GEMINI_KEY = "AIzaSyAaMGn0e42xQEy2-4NBaFoGSeP8OF0yuig"; // Tu clave de Gemini
        // =====================

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                enviarPregunta();
            }
        }

        async function enviarPregunta() {
            const pregunta = preguntaInput.value.trim();
            if (!pregunta) return;

            agregarMensaje(pregunta, 'user');
            preguntaInput.value = '';

            const typingId = mostrarTyping();

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: pregunta }] }]
                    })
                });

                const data = await response.json();
                eliminarTyping(typingId);

                if (data.error) {
                    agregarMensaje(`Error: ${data.error.message || JSON.stringify(data.error)}`, 'assistant');
                } else if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const texto = data.candidates[0].content.parts[0].text;
                    agregarMensaje(texto, 'assistant');
                } else {
                    agregarMensaje('Respuesta inesperada', 'assistant');
                }
            } catch (error) {
                eliminarTyping(typingId);
                agregarMensaje(`Error de conexión: ${error.message}`, 'assistant');
            }
        }

        function agregarMensaje(texto, emisor) {
            const mensajeDiv = document.createElement('div');
            mensajeDiv.className = `message ${emisor}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            if (emisor === 'user') {
                avatar.innerHTML = '<img src="https://fotos.perfil.com/2023/12/06/trim/1040/780/jeffrey-epstein-y-ghislaine-maxwell-1713730.jpg" alt="User">';
            } else {
                avatar.innerHTML = '<img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/dark/gemini-color.png" alt="Gemini">';
            }

            const contenido = document.createElement('div');
            contenido.className = 'message-content';
            const p = document.createElement('p');
            p.textContent = texto;
            contenido.appendChild(p);

            mensajeDiv.appendChild(avatar);
            mensajeDiv.appendChild(contenido);
            messagesArea.appendChild(mensajeDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function mostrarTyping() {
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = id;
            typingDiv.innerHTML = `
                <div class="message-avatar">
                    <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/dark/gemini-color.png" alt="Gemini">
                </div>
                <div class="message-content">
                    <div class="typing">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            return id;
        }

        function eliminarTyping(id) {
            const elem = document.getElementById(id);
            if (elem) elem.remove();
        }
    </script>
</body>
</html>
